{% extends 'base.html' %}
{% block title %}Camera - {{ child.name }}{% endblock %}
{% block content %}
<style>
  :root {
    --dash-ink: #172033;
    --dash-muted: #667085;
    --dash-panel: rgba(255, 255, 255, 0.92);
    --dash-line: rgba(37, 99, 235, 0.14);
    --dash-primary: #2563eb;
    --dash-radius: 16px;
  }
  
  body {
    background:
      radial-gradient(circle at 15% 0%, rgba(8, 145, 178, 0.24), transparent 30%),
      radial-gradient(circle at 95% 12%, rgba(219, 39, 119, 0.16), transparent 28%),
      linear-gradient(135deg, #eef7ff 0%, #f8fbff 47%, #fff5fb 100%) !important;
    min-height: 100vh;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }

  /* Preview Frame Logic */
  .dashboard-preview-frame {
    width: 100%;
    transition: width 0.25s ease, padding 0.25s ease;
  }

  body.dashboard-mobile-preview .dashboard-preview-frame {
    width: min(430px, calc(100vw - 24px));
    min-height: 844px;
    margin: 20px auto 48px;
    padding: 10px !important;
    border: 10px solid #111827;
    border-radius: 38px;
    background: #f8fbff;
    box-shadow: 0 28px 80px rgba(15, 23, 42, 0.24);
    overflow: hidden;
    position: relative;
  }

  body.dashboard-mobile-preview .dashboard-preview-frame::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    z-index: 10;
    width: 128px;
    height: 24px;
    transform: translateX(-50%);
    border-radius: 0 0 18px 18px;
    background: #111827;
  }

  .tool-shell {
    width: min(1180px, 100%);
    margin: 0 auto;
    padding: 20px 15px 120px;
  }

  body.dashboard-mobile-preview .tool-shell {
    width: 100%;
    padding: 20px 10px 100px;
    max-height: 804px;
    overflow-y: auto;
  }

  .preview-toolbar {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }

  .preview-toggle {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--dash-line);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(10px);
  }

  .preview-toggle button {
    min-width: 92px;
    min-height: 34px;
    border: 0;
    border-radius: 8px;
    background: transparent;
    color: var(--dash-muted);
    font-weight: 800;
    font-size: 0.85rem;
    transition: all 0.2s ease;
  }

  .preview-toggle button.active {
    background: var(--dash-primary);
    color: #fff;
  }
  
  .camera-card {
    background: var(--dash-panel);
    border-radius: 24px;
    padding: 32px;
    border: 1px solid var(--dash-line);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
    backdrop-filter: blur(20px);
  }

  body.dashboard-mobile-preview .camera-card {
    padding: 20px 16px;
  }
  
  .camera-header {
    text-align: center;
    margin-bottom: 24px;
  }
  
  .camera-header h2 {
    font-size: 1.8rem;
    font-weight: 850;
    color: var(--dash-ink);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  
  .recording-indicator {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 800;
    font-size: 0.85rem;
    animation: icon-pulse 2s infinite ease-in-out;
  }
  
  .video-container {
    position: relative;
    width: 100%;
    max-width: 640px;
    max-height: 480px;
    margin: 0 auto 24px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    background: #000;
    aspect-ratio: 4/3;
  }
  
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  
  .recording-timer {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(239, 68, 68, 0.9);
    color: white;
    padding: 8px 16px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 1.1rem;
    font-family: 'Inter', monospace;
    backdrop-filter: blur(8px);
  }
  
  .camera-controls {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 32px;
  }
  
  .btn-camera {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
  }

  .btn-camera:hover {
    transform: scale(1.1) translateY(-4px);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
  }

  .btn-camera:active {
    transform: scale(0.95);
  }
  
  .btn-stop {
    background: #ef4444;
  }
  
  .btn-switch {
    background: var(--dash-primary);
  }
  
  .info-section {
    background: rgba(255, 255, 255, 0.5);
    border-radius: 20px;
    padding: 24px;
    border: 1px solid var(--dash-line);
    margin-top: 24px;
  }
  
  .form-label {
    font-weight: 700;
    color: var(--dash-ink);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    display: block;
  }
  
  .form-control, .form-select {
    border: 1.5px solid var(--dash-line);
    border-radius: 12px;
    padding: 12px 16px;
    background: #f8fbff;
    transition: all 0.2s ease;
  }

  .form-control:focus, .form-select:focus {
    border-color: var(--dash-primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    background: #fff;
  }
  
  .btn-confirm {
    background: var(--dash-primary);
    color: white;
    border: 0;
    padding: 14px 24px;
    border-radius: 12px;
    font-weight: 800;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
  }

  .btn-confirm:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
  }

  .btn-cancel {
    background: transparent;
    color: var(--dash-muted);
    border: 1.5px solid var(--dash-line);
    padding: 14px 24px;
    border-radius: 12px;
    font-weight: 700;
    transition: all 0.2s ease;
  }

  .btn-cancel:hover {
    background: rgba(0, 0, 0, 0.05);
    color: var(--dash-ink);
  }
</style>

<div class="dashboard-preview-frame" data-child-id="{{ child.id }}">
  <div class="tool-shell">
    <div class="preview-toolbar" aria-label="Camera preview mode">
      <div class="preview-toggle">
        <button type="button" id="desktop-preview-btn" class="active">Desktop</button>
        <button type="button" id="mobile-preview-btn">Mobile</button>
      </div>
    </div>

    <div class="camera-card">
      <div class="camera-header">
        <div class="mb-2">
          <span class="live-icon"><i data-lucide="camera" style="width: 48px; height: 48px; color: var(--dash-primary);"></i></span>
        </div>
        <h2>Live Camera</h2>
        <p class="text-muted">Monitoring {{ child.name }}</p>
        <div class="mt-3" id="recordingIndicator" style="display: none;">
          <span class="recording-indicator">
            <i data-lucide="circle" style="width: 12px; height: 12px; fill: currentColor;"></i>
            RECORDING LIVE
          </span>
        </div>
      </div>

      <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="recording-timer" id="timerContainer" style="display: none;">
          <span id="timer">00:00</span>
        </div>
      </div>

      <div class="camera-controls">
        <button class="btn-camera btn-switch" id="switchCameraBtn" title="Switch Camera">
          <i data-lucide="refresh-cw"></i>
        </button>
        <button class="btn-camera btn-confirm" id="startRecordingBtn" title="Start Recording" style="background: #22c55e;">
          <i data-lucide="play" style="fill: white;"></i>
        </button>
        <button class="btn-camera btn-stop" id="stopRecordingBtn" title="Stop Recording" style="display: none;">
          <i data-lucide="square" style="fill: white;"></i>
        </button>
      </div>

      <div class="info-section">
        <h5 class="fw-bold mb-4">Recording Details</h5>
        
        <div class="mb-4">
          <label class="form-label">Notes</label>
          <textarea id="recordingDescription" class="form-control" placeholder="Add notes about this recording..." rows="2"></textarea>
        </div>
        
        <div class="mb-4">
          <label class="form-label">Recording Type</label>
          <select id="recordingType" class="form-select">
            <option value="video">🎥 Video Recording</option>
            <option value="photo">📷 Instant Photo</option>
            <option value="audio">🎙️ Audio Only</option>
          </select>
        </div>
        
        <div class="d-flex gap-3">
          <button class="btn-cancel flex-grow-1" id="discardBtn">Discard</button>
          <button class="btn-confirm flex-grow-1" id="uploadBtn">Save Recording</button>
        </div>
        
        <div id="statusMessage"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const timer = document.getElementById('timer');
  const switchCameraBtn = document.getElementById('switchCameraBtn');
  const stopRecordingBtn = document.getElementById('stopRecordingBtn');
  const discardBtn = document.getElementById('discardBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  const statusMessage = document.getElementById('statusMessage');
  
  let currentFacingMode = 'user';
  let stream = null;
  let mediaRecorder = null;
  let recordedChunks = [];
  let recordingStartTime = null;
  let timerInterval = null;
  const childId = {{ child.id }};

  async function startCamera() {
    try {
      const constraints = {
        video: { facingMode: currentFacingMode },
        audio: true
      };
      
      stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
    } catch (err) {
      showStatus('❌ Camera access denied. Please allow camera permissions.', 'error');
      console.error('Error accessing camera:', err);
    }
  }

  function startRecording() {
    try {
      if (!stream) {
        showStatus('❌ Camera not ready', 'error');
        return;
      }
      recordedChunks = [];
      recordingStartTime = Date.now();
      
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
        ? 'video/webm;codecs=vp9'
        : MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
        ? 'video/webm;codecs=vp8'
        : 'video/webm';
      
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) recordedChunks.push(event.data);
      };
      
      mediaRecorder.start();
      startTimer();
      
      // UI Updates
      document.getElementById('recordingIndicator').style.display = 'block';
      document.getElementById('timerContainer').style.display = 'block';
      document.getElementById('startRecordingBtn').style.display = 'none';
      document.getElementById('stopRecordingBtn').style.display = 'flex';
      
      showStatus('✅ Recording started!', 'success');
    } catch (err) {
      showStatus('❌ Failed to start recording', 'error');
    }
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      timer.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }, 1000);
  }

  document.getElementById('startRecordingBtn').addEventListener('click', startRecording);

  switchCameraBtn.addEventListener('click', async () => {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
    if (timerInterval) clearInterval(timerInterval);
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    
    // Hide recording UI on switch
    document.getElementById('recordingIndicator').style.display = 'none';
    document.getElementById('timerContainer').style.display = 'none';
    document.getElementById('startRecordingBtn').style.display = 'flex';
    document.getElementById('stopRecordingBtn').style.display = 'none';
    
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });

  stopRecordingBtn.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      if (timerInterval) clearInterval(timerInterval);
      
      document.getElementById('recordingIndicator').style.display = 'none';
      document.getElementById('stopRecordingBtn').style.display = 'none';
      
      showStatus('⏸️ Recording stopped. Review and upload below.', 'info');
      switchCameraBtn.disabled = true;
    }
  });

  discardBtn.addEventListener('click', () => {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
    window.location.href = '/child/' + childId + '/daily-recordings';
  });

  uploadBtn.addEventListener('click', async () => {
    const description = document.getElementById('recordingDescription').value;
    const recordingType = document.getElementById('recordingType').value;
    
    if (!recordedChunks.length) {
      showStatus('❌ No recording to upload', 'error');
      return;
    }
    
    try {
      uploadBtn.disabled = true;
      uploadBtn.textContent = '⏳ Uploading...';
      
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      
      // Validate blob size
      if (blob.size === 0) {
        showStatus('❌ Recording is empty. Please try again.', 'error');
        uploadBtn.disabled = false;
        uploadBtn.textContent = '✅ Upload Recording';
        return;
      }
      
      console.log('Uploading blob of size:', blob.size);
      
      const formData = new FormData();
      formData.append('file', blob, 'recording.webm');
      formData.append('description', description);
      formData.append('recording_type', recordingType);
      
      const response = await fetch('/child/' + childId + '/daily-recordings', {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });
      
      console.log('Response status:', response.status);
      
      if (response.ok) {
        const data = await response.json();
        showStatus('✅ Recording uploaded successfully!', 'success');
        setTimeout(() => {
          window.location.href = '/child/' + childId + '/daily-recordings';
        }, 1500);
      } else {
        let errorMsg = 'Upload failed';
        try {
          const error = await response.json();
          errorMsg = error.error || errorMsg;
        } catch (e) {
          errorMsg = 'Server error (' + response.status + ')';
        }
        showStatus('❌ ' + errorMsg, 'error');
        console.error('Upload error:', response.status, errorMsg);
        uploadBtn.disabled = false;
        uploadBtn.textContent = '✅ Upload Recording';
      }
    } catch (err) {
      showStatus('❌ Network error: ' + err.message, 'error');
      console.error('Upload error:', err);
      uploadBtn.disabled = false;
      uploadBtn.textContent = '✅ Upload Recording';
    }
  });

  function showStatus(message, type) {
    statusMessage.innerHTML = `<div class="status-message status-${type}">${message}</div>`;
  }

  // Start camera and recording on page load
  startCamera();

  // Stop recording when leaving page
  window.addEventListener('beforeunload', () => {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
    if (timerInterval) {
      clearInterval(timerInterval);
    }
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
