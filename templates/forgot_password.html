{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="card-title text-center mb-4">استرجع كلمة السر</h2>
          <p class="text-center text-muted mb-4">أدخل البريد الإلكتروني المسجل لديك</p>
          
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-bold">البريد الإلكتروني</label>
              <input class="form-control form-control-lg" name="email" type="email" required placeholder="your@email.com">
            </div>
            <button class="btn btn-primary btn-lg w-100 fw-bold" type="submit">إرسال رابط الاسترجاع</button>
          </form>

          <hr class="my-4">
          <p class="text-center mb-0">
            تذكرت كلمة السر؟ 
            <a href="{{ url_for('login') }}" class="fw-bold">دخول الآن</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <style>
    body {
      background: linear-gradient(135deg, #5faee9 0%, #5b7fa3 100%);
      min-height: 100vh;
    }
    .card {
      border-radius: 15px;
    }
  </style>
{% endblock %}
