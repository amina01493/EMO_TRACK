{% extends 'base.html' %}
{% block title %}Author - {{ author.username }}{% endblock %}
{% block content %}
  <h2>{{ author.username }}</h2>
  <p><strong>Email:</strong> {{ author.email }}</p>
  <h5 class="mt-3">Bio</h5>
  <p>{{ author.bio|default('No bio yet.') }}</p>
  <a class="btn btn-secondary mt-3" href="{{ url_for('index') }}">Back</a>
{% endblock %}
