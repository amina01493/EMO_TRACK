{% extends 'base.html' %}
{% block title %}Login - Guardian{% endblock %}
{% block content %}
  <div class="row justify-content-center mt-5">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold">دخول</h2>
            <p class="text-muted">ادخل حسابك في Guardian</p>
          </div>
          
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-bold">اسم المستخدم</label>
              <input class="form-control form-control-lg" name="username" required placeholder="أدخل اسم المستخدم">
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">كلمة السر</label>
              <input class="form-control form-control-lg" name="password" type="password" required placeholder="أدخل كلمة السر">
            </div>

            <button class="btn btn-primary btn-lg w-100 fw-bold mb-3" type="submit">
              دخول
            </button>
          </form>

          <div class="text-center small mb-3">
            <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">نسيت كلمة السر؟</a>
          </div>

          <hr class="my-3">
          <p class="text-center small mb-0">
            ليس لديك حساب؟ 
            <a href="{{ url_for('register') }}" class="fw-bold text-decoration-none">إنشاء حساب</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <style>
    .card {
      border-radius: 12px;
      margin-top: 20px;
    }

    .form-control, .form-select {
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .form-control:focus {
      border-color: #5faee9;
      box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, #5faee9 0%, #5b7fa3 100%);
      border: none;
      border-radius: 8px;
      font-weight: 600;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }
  </style>
{% endblock %}
