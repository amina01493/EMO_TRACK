{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="card-title text-center mb-4">تحديث كلمة السر</h2>
          <p class="text-center text-muted small mb-4">{{ email }}</p>
          
          <form method="post">
            <div class="mb-3">
              <label class="form-label fw-bold">كلمة السر الجديدة</label>
              <input class="form-control form-control-lg" name="password" type="password" required placeholder="كلمة سر قوية">
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">تأكيد كلمة السر</label>
              <input class="form-control form-control-lg" name="password_confirm" type="password" required placeholder="أعد الكلمة">
            </div>
            <button class="btn btn-primary btn-lg w-100 fw-bold" type="submit">تحديث كلمة السر</button>
          </form>

          <hr class="my-4">
          <p class="text-center mb-0">
            <a href="{{ url_for('login') }}" class="fw-bold">العودة للدخول</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <style>
    body {
      background: linear-gradient(135deg, #5faee9 0%, #5b7fa3 100%);
      min-height: 100vh;
    }
    .card {
      border-radius: 15px;
    }
  </style>
{% endblock %}
