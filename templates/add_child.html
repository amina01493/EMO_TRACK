{% extends 'base.html' %}
{% block title %}Add Child{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2>Add New Child</h2>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select class="form-select" name="gender">
            <option value="boy">Boy</option>
            <option value="girl">Girl</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Age</label>
          <input class="form-control" name="age" type="number">
        </div>
        <div class="mb-3">
          <label class="form-label">Bracelet Code (Required)</label>
          <input class="form-control" name="bracelet_code" placeholder="Device ID" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Add Child</button>
        <a class="btn btn-secondary w-100 mt-2" href="{{ url_for('dashboard') }}">Cancel</a>
      </form>
    </div>
  </div>
{% endblock %}
